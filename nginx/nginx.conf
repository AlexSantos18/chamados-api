events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # O frontend é servido por um container estático separado e consumido pelo Nginx como app principal.
    upstream frontend {
        server frontend:3000;
    }

    # A API permanece privada dentro da rede Docker e só sai para fora pelo proxy reverso.
    upstream api {
        server api:5000;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 chamados.hnss _;

        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Toda rota não-API cai no frontend para suportar navegação client-side do React Router.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Normaliza /api para /api/
        location = /api {
            return 301 /api/;
        }

        # Remove o prefixo /api antes de encaminhar para o Express, que expõe rotas na raiz.
        location /api/ {
            proxy_pass http://api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Rate limiting para API
            limit_req zone=api_limit burst=20 nodelay;
        }

        # Rate limiting para login
        location = /api/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://api/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Socket.IO usa upgrade de conexão e precisa de proxy dedicado para WebSocket.
        location /socket.io {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Uploads são servidos diretamente pelo Nginx para evitar passar arquivos estáticos pela aplicação.
        location /uploads {
            alias /uploads;
            autoindex off;
        }
    }
}
